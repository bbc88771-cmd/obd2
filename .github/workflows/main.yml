name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Разложить файлы по папкам
        run: |
          mkdir -p lib/core lib/transport lib/state lib/ui
          place() { f=$(find . -name "$1" -not -path "./lib/*" | head -1); [ -n "$f" ] && mv "$f" "$2/" && echo "OK: $1"; }
          place obd_transport.dart lib/transport
          place ble_transport.dart lib/transport
          place bt_classic_transport.dart lib/transport
          place wifi_transport.dart lib/transport
          place obd_connection.dart lib/core
          place request_queue.dart lib/core
          place obd_parsers.dart lib/core
          place obd_service.dart lib/core
          place connection_provider.dart lib/state
          place gauge_widget.dart lib/ui
          place dashboard_screen.dart lib/ui
          place main.dart lib
          find lib -type f

      - name: Убрать несовместимый BT Classic
        run: |
          sed -i '/flutter_bluetooth_serial_ble/d' pubspec.yaml
          rm -f lib/transport/bt_classic_transport.dart
          sed -i '/bt_classic_transport.dart/d' lib/state/connection_provider.dart
          sed -i 's/return BtClassicTransport();/return BleTransport();/' lib/state/connection_provider.dart
          echo "=== pubspec ==="; cat pubspec.yaml

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter create . --platforms=android
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: obd-scanner-apk
          path: build/app/outputs/flutter-apk/app-release.apk
