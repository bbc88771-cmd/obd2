# Как получить APK для Android

Есть три пути — от «ничего не ставить» до «полный контроль».

## Вариант A — облако, без установки чего-либо (рекомендую для старта)

В проекте уже лежит `.github/workflows/build_apk.yml`. GitHub соберёт APK сам.

1. Создай репозиторий на github.com.
2. Залей туда содержимое этой папки:
   ```bash
   cd obd_scanner
   git init && git add . && git commit -m "init"
   git branch -M main
   git remote add origin https://github.com/ТВОЙ_ЛОГИН/obd_scanner.git
   git push -u origin main
   ```
3. Открой вкладку **Actions** в репозитории → дождись зелёной галочки (~5 мин).
4. Внутри завершённого запуска внизу будет артефакт **obd-scanner-apk** → скачай zip → внутри `app-release.apk`.
5. Перекинь APK на телефон, открой, разреши «установку из неизвестных источников» → готово.

> Это бесплатно для публичных репозиториев и в рамках бесплатных минут для приватных.

## Вариант B — локально (нужен Flutter SDK, ~15 мин настройки)

```bash
# 1. Поставь Flutter SDK: https://docs.flutter.dev/get-started/install
flutter doctor              # покажет, чего не хватает (Android SDK ставится через Android Studio)

# 2. В папке проекта:
flutter pub get
flutter create . --platforms=android   # досоздаёт android/ если его нет
flutter build apk --release

# 3. Готовый файл:
# build/app/outputs/flutter-apk/app-release.apk
```

APK перекинь на телефон (кабель, Telegram себе, облако) и установи.

> Хочешь сразу запустить на подключённом телефоне без ручной установки:
> `flutter run --release`

## Вариант C — облачный сервис Codemagic (GUI, без git-команд)

1. Зарегистрируйся на codemagic.io, подключи репозиторий.
2. Выбери Flutter-проект → Build → скачай APK.
   Подходит, если не хочешь возиться с GitHub Actions.

---

## Важно про размер и подпись

- `app-release.apk` собирается с debug-подписью по умолчанию — **для себя и тестов этого достаточно**.
- Для публикации в Google Play нужен **подписанный** релиз (keystore) и формат **.aab**:
  ```bash
  flutter build appbundle --release
  ```
  Настройка подписи — отдельный шаг, могу расписать, когда дойдёт до публикации.

## Если APK не ставится на телефон

- Включи «Установка из неизвестных источников» для приложения, через которое открываешь файл.
- На Android 14+ может потребоваться разрешить установку именно для файлового менеджера.
- Если пишет «приложение не установлено» — почти всегда это конфликт подписи со старой версией: удали предыдущую сборку и поставь заново.
